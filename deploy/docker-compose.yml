version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: avatar
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-changeme123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  openclaw:
    image: openclaw/openclaw:latest
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      MQTT_BROKER: mqtt://mosquitto:1883
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: avatar-videos
    volumes:
      - ../skills:/opt/openclaw/skills:ro
      - ../shared:/opt/openclaw/shared:ro
      - ../templates:/opt/openclaw/templates:ro
    depends_on:
      - mosquitto
      - redis
      - minio

  creator-api:
    build:
      context: ..
      dockerfile: creator-api/Dockerfile
    ports:
      - "3099:3099"
    environment:
      REDIS_URL: redis://redis:6379
      OPENCLAW_URL: http://openclaw:18789
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN:-45664d47b15ca052dcdf572f2c311a6e9a31251192ac49ad}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: creator-uploads
      MINIO_ACCESS_KEY: avatar
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-changeme123}
    depends_on:
      - openclaw
      - redis
      - minio

volumes:
  redis_data:
  minio_data:
