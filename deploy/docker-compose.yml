version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: avatar
      POSTGRES_PASSWORD: avatar123
      POSTGRES_DB: avatar_video
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: avatar
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-changeme123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  creator-api:
    build:
      context: ..
      dockerfile: creator-api/Dockerfile
    ports:
      - "3099:3099"
    environment:
      REDIS_URL: redis://redis:6379
      DEEPSEEK_KEY: ${DEEPSEEK_KEY:-sk-placeholder}
      RH_API_KEY: ${RH_API_KEY:-}
      RH_API_BASE_URL: https://www.runninghub.cn/openapi/v2
      MQTT_BROKER: mqtt://mosquitto:1883
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: creator-uploads
      MINIO_ACCESS_KEY: avatar
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-changeme123}
      DATABASE_URL: postgresql://avatar:avatar123@postgres:5432/avatar_video
    depends_on:
      - redis
      - minio
      - postgres

  creator-worker:
    build:
      context: ..
      dockerfile: creator-api/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      RH_API_KEY: ${RH_API_KEY:-}
      RH_API_BASE_URL: https://www.runninghub.cn/openapi/v2
      DATABASE_URL: postgresql://avatar:avatar123@postgres:5432/avatar_video
    command: node workers/generation-worker.js
    depends_on:
      - redis
      - postgres

volumes:
  redis_data:
  minio_data:
  postgres_data:
